          items:
            $ref: "#/components/schemas/TopProduct"
        abandonedCarts:
          $ref: "#/components/schemas/AbandonedCarts"
      required:
        - from
        - to
        - orders
        - revenue
        - avgTicket
        - unitsSold
        - cartConversionRate
        - salesByDay
        - topProducts
        - abandonedCarts
