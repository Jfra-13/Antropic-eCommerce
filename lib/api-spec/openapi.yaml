openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: Catalog read operations (categories, occasions, products)
  - name: cart
    description: Persisted cart operations (owner-scoped)
  - name: wishlist
    description: Persisted wishlist operations (owner-scoped)
  - name: checkout
    description: Checkout quote (server-side totals preview, owner-scoped)
  - name: orders
    description: Order operations (create from cart, list/get own orders)
  - name: payments
    description: Payment proof upload (Yape/Plin constancia, owner-scoped)
  - name: admin
    description: Backoffice operations (employee/admin only)
  - name: config
    description: Public store config (delivery fee, Yape, pickup points, banners)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /categories:
    get:
      operationId: listCategories
      tags: [catalog]
      summary: List active categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /occasions:
    get:
      operationId: listOccasions
      tags: [catalog]
      summary: List active occasions
      responses:
        "200":
          description: Occasions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Occasion"
  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      summary: List active products (paginated)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: occasion
          in: query
          required: false
          description: Filter by occasion slug
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: Case-insensitive name search
          schema:
            type: string
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
  /products/{slug}:
    get:
      operationId: getProduct
      tags: [catalog]
      summary: Get one active product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get the authenticated user's cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add a variant to the cart (increments if already present)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "404":
          description: Variant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cart/items/{variantId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Set the absolute quantity of a cart line
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartQuantityInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "404":
          description: Line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove a variant from the cart
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /cart/merge:
    post:
      operationId: mergeCart
      tags: [cart]
      summary: Merge a guest cart into the persisted cart (sums quantities, clamps to stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartMergeInput"
      responses:
        "200":
          description: Merged cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get the authenticated user's wishlist products
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
    post:
      operationId: addWishlistItem
      tags: [wishlist]
      summary: Add a product to the wishlist (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistInput"
      responses:
        "200":
          description: Updated wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /wishlist/{productId}:
    delete:
      operationId: removeWishlistItem
      tags: [wishlist]
      summary: Remove a product from the wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
  /checkout/quote:
    post:
      operationId: checkoutQuote
      tags: [checkout]
      summary: Preview server-side totals for the current cart (subtotal + shipping - coupon)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutQuoteInput"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutQuote"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Coupon invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order from the authenticated user's cart (totals computed server-side)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid body (missing address/pickup point)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Empty cart or out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Coupon invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listOrders
      tags: [orders]
      summary: List the authenticated user's orders (paginated, newest first)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get one of the authenticated user's orders (used for payment status polling)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/{id}/payment-proof/upload-url:
    post:
      operationId: createPaymentProofUploadUrl
      tags: [payments]
      summary: Get a signed URL to upload a payment proof directly to private Storage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Signed upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentProofUploadUrl"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/{id}/payment-proof:
    post:
      operationId: attachPaymentProof
      tags: [payments]
      summary: Attach an uploaded payment proof and move the order to verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachPaymentProofInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Order not in a state that accepts a proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/payments/queue:
    get:
      operationId: listPaymentVerificationQueue
      tags: [admin]
      summary: List orders awaiting payment verification (oldest first), with a signed proof URL
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated verification queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerificationQueue"
  /admin/orders/{id}/approve:
    post:
      operationId: approveOrderPayment
      tags: [admin]
      summary: Approve a payment — moves the order to pagado and decrements stock (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Order not awaiting verification, or insufficient stock to fulfil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/orders/{id}/reject:
    post:
      operationId: rejectOrderPayment
      tags: [admin]
      summary: Reject a payment — moves the order to rechazado (idempotent, no stock change)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Order not awaiting verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/shipments:
    get:
      operationId: listShipments
      tags: [admin]
      summary: List paid orders in fulfilment (logistics board), filterable by method and status
      parameters:
        - name: deliveryMethod
          in: query
          required: false
          schema:
            type: string
            enum: [delivery, recojo]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Paginated shipments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipmentList"
  /admin/orders/{id}/fulfillment:
    post:
      operationId: advanceFulfillment
      tags: [admin]
      summary: Advance an order's fulfilment status (validated state transition)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceFulfillmentInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Order not in fulfilment, or invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products:
    get:
      operationId: listAdminProducts
      tags: [admin]
      summary: List all products for inventory management (includes inactive)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated admin products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProductList"
    post:
      operationId: createProduct
      tags: [admin]
      summary: Create a product (optionally with occasions and variants)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "409":
          description: Slug or SKU already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products/{id}:
    patch:
      operationId: updateProduct
      tags: [admin]
      summary: Update a product's fields (partial); soft-delete via active=false
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products/{id}/variants:
    post:
      operationId: createVariant
      tags: [admin]
      summary: Add a size/color variant to a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVariantInput"
      responses:
        "200":
          description: Updated product (with the new variant)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: SKU or size/color combination already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products/{id}/media:
    post:
      operationId: attachProductMedia
      tags: [admin]
      summary: Attach an uploaded photo/video to a product (appended last)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachProductMediaInput"
      responses:
        "200":
          description: Updated product (with the new media)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/media/{id}:
    delete:
      operationId: deleteProductMedia
      tags: [admin]
      summary: Remove a product media item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Media not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/products/import:
    post:
      operationId: importProducts
      tags: [admin]
      summary: Bulk import products/variants from CSV (upsert by SKU); dryRun previews errors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductImportInput"
      responses:
        "200":
          description: Import result (row-level errors, imported count)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductImportResult"
        "400":
          description: CSV could not be parsed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/variants/{id}:
    patch:
      operationId: updateVariant
      tags: [admin]
      summary: Update a variant (stock, price override, active, size/color/sku)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariantInput"
      responses:
        "200":
          description: Updated product (owning the variant)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Variant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: SKU or size/color combination already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/dashboard:
    get:
      operationId: getDashboard
      tags: [admin]
      summary: Backoffice landing KPIs, alerts and top products (employee + admin)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /admin/reports:
    get:
      operationId: getSalesReport
      tags: [admin]
      summary: Sales, funnel and abandoned-cart report for a date range (admin only)
      parameters:
        - name: from
          in: query
          required: false
          description: ISO date YYYY-MM-DD (inclusive). Defaults to 30 days ago.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        - name: to
          in: query
          required: false
          description: ISO date YYYY-MM-DD (inclusive). Defaults to today.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"
  /admin/coupons:
    get:
      operationId: listCoupons
      tags: [admin]
      summary: List coupons for management (admin only)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated coupons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponList"
    post:
      operationId: createCoupon
      tags: [admin]
      summary: Create a coupon (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponInput"
      responses:
        "201":
          description: Created coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
        "409":
          description: Coupon code already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/coupons/{id}:
    patch:
      operationId: updateCoupon
      tags: [admin]
      summary: Update a coupon's fields (partial); activate/deactivate via active
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCouponInput"
      responses:
        "200":
          description: Updated coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
        "404":
          description: Coupon not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Coupon code already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCoupon
      tags: [admin]
      summary: Delete a coupon (admin only); blocked if already redeemed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Coupon not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Coupon already redeemed, cannot delete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /returns:
    post:
      operationId: createReturn
      tags: [returns]
      summary: Open a return ticket for one of the caller's orders (requerimientos §7.6)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReturnInput"
      responses:
        "201":
          description: Created return ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnTicket"
        "404":
          description: Order not found or not owned by the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/returns:
    get:
      operationId: listReturns
      tags: [admin]
      summary: List return tickets for the backoffice board (requerimientos §6.7)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [nueva, en_proceso, resuelta, cerrada]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated return tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReturnList"
  /admin/returns/{id}:
    patch:
      operationId: updateReturnStatus
      tags: [admin]
      summary: Update a return ticket's status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReturnStatusInput"
      responses:
        "200":
          description: Updated return ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReturn"
        "404":
          description: Return ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List users for management (requerimientos §6.9, solo Admin)
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [customer, employee, admin]
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"
    post:
      operationId: createEmployee
      tags: [admin]
      summary: Create an employee (provisions a Supabase auth user, magic-link login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeInput"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user — block a client, edit an employee, change role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Cannot modify your own role or blocked status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /config:
    get:
      operationId: getPublicConfig
      tags: [config]
      summary: Public store config for checkout/home (delivery fee, Yape, banners)
      responses:
        "200":
          description: Public config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicConfig"
  /pickup-points:
    get:
      operationId: listPickupPoints
      tags: [config]
      summary: Active pickup points in La Molina (for checkout recojo)
      responses:
        "200":
          description: Active pickup points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupPointList"
  /admin/config:
    get:
      operationId: getAdminConfig
      tags: [admin]
      summary: Get store config for the admin panel (admin only)
      responses:
        "200":
          description: Admin config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfig"
    put:
      operationId: updateAdminConfig
      tags: [admin]
      summary: Update store config — delivery fee, Yape number/QR, banners (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfigInput"
      responses:
        "200":
          description: Updated admin config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfig"
  /admin/config/media/upload-url:
    post:
      operationId: createConfigMediaUploadUrl
      tags: [admin]
      summary: Signed URL to upload a QR/banner image to public Storage (admin only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigMediaUploadInput"
      responses:
        "200":
          description: Signed upload URL plus the public read URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigMediaUploadUrl"
  /admin/pickup-points:
    get:
      operationId: listAdminPickupPoints
      tags: [admin]
      summary: List all pickup points including inactive (admin only)
      responses:
        "200":
          description: Pickup points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupPointList"
    post:
      operationId: createPickupPoint
      tags: [admin]
      summary: Create a pickup point (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePickupPointInput"
      responses:
        "201":
          description: Created pickup point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupPoint"
  /admin/pickup-points/{id}:
    patch:
      operationId: updatePickupPoint
      tags: [admin]
      summary: Update a pickup point (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePickupPointInput"
      responses:
        "200":
          description: Updated pickup point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupPoint"
        "404":
          description: Pickup point not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePickupPoint
      tags: [admin]
      summary: Delete a pickup point (admin only); blocked if referenced by orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "404":
          description: Pickup point not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Referenced by orders, cannot delete (deactivate instead)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - slug
        - name
        - sortOrder
    Occasion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - slug
        - name
        - sortOrder
    ProductImage:
      type: object
      properties:
        kind:
          type: string
          enum: [image, video]
        path:
          type: string
        sortOrder:
          type: integer
      required:
        - kind
        - path
        - sortOrder
    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        size:
          type: string
        color:
          type: string
        sku:
          type: string
        stock:
          type: integer
      required:
        - id
        - size
        - color
        - sku
        - stock
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        fit:
          type: [string, "null"]
        # Money is fixed-point numeric serialized as a string. Never parse to float for math.
        price:
          type: string
        badge:
          type: [string, "null"]
        featured:
          type: boolean
        category:
          $ref: "#/components/schemas/Category"
        occasions:
          type: array
          items:
            $ref: "#/components/schemas/Occasion"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
      required:
        - id
        - slug
        - name
        - description
        - fit
        - price
        - badge
        - featured
        - category
        - occasions
        - images
        - variants
    ProductList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    CartItemInput:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
        - variantId
    CartQuantityInput:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
      required:
        - quantity
    CartMergeInput:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemInput"
      required:
        - items
    CartItem:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        size:
          type: string
        color:
          type: string
        sku:
          type: string
        stock:
          type: integer
        # Effective unit price (variant override or product price). Fixed-point string.
        unitPrice:
          type: string
        quantity:
          type: integer
        image:
          type: [string, "null"]
      required:
        - variantId
        - productId
        - slug
        - name
        - size
        - color
        - sku
        - stock
        - unitPrice
        - quantity
        - image
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
      required:
        - items
    WishlistInput:
      type: object
      properties:
        productId:
          type: string
          format: uuid
      required:
        - productId
    Wishlist:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - items
    CheckoutQuoteInput:
      type: object
      properties:
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        couponCode:
          type: [string, "null"]
      required:
        - deliveryMethod
    QuoteItem:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        name:
          type: string
        variantLabel:
          type: string
        # Fixed-point money strings. Never parse to float for math.
        unitPrice:
          type: string
        quantity:
          type: integer
        lineTotal:
          type: string
      required:
        - variantId
        - name
        - variantLabel
        - unitPrice
        - quantity
        - lineTotal
    CheckoutQuote:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"
        subtotal:
          type: string
        shippingCost:
          type: string
        discountAmount:
          type: string
        total:
          type: string
        couponCode:
          type: [string, "null"]
      required:
        - items
        - subtotal
        - shippingCost
        - discountAmount
        - total
        - couponCode
    CreateOrderInput:
      type: object
      properties:
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        shippingAddress:
          type: [string, "null"]
          description: Required when deliveryMethod is delivery
        pickupPointId:
          type: [string, "null"]
          format: uuid
          description: Required when deliveryMethod is recojo
        couponCode:
          type: [string, "null"]
        idempotencyKey:
          type: [string, "null"]
          description: Client-supplied key; a repeated key returns the same order
      required:
        - deliveryMethod
    OrderItem:
      type: object
      properties:
        variantId:
          type: [string, "null"]
          format: uuid
        productName:
          type: string
        variantLabel:
          type: [string, "null"]
        sku:
          type: [string, "null"]
        unitPrice:
          type: string
        quantity:
          type: integer
        lineTotal:
          type: string
      required:
        - variantId
        - productName
        - variantLabel
        - sku
        - unitPrice
        - quantity
        - lineTotal
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
        # Derived Yape match key: ANT-{orderNumber}. Not stored.
        referenceCode:
          type: string
        paymentStatus:
          type: string
          enum: [pendiente_pago, en_verificacion, pagado, rechazado]
        fulfillmentStatus:
          type: [string, "null"]
          enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado, null]
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        pickupPointId:
          type: [string, "null"]
          format: uuid
        shippingAddress:
          type: [string, "null"]
        subtotal:
          type: string
        shippingCost:
          type: string
        discountAmount:
          type: string
        total:
          type: string
        couponCode:
          type: [string, "null"]
        paymentProofStatus:
          type: [string, "null"]
          enum: [pendiente, aprobado, rechazado, null]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - orderNumber
        - referenceCode
        - paymentStatus
        - fulfillmentStatus
        - deliveryMethod
        - pickupPointId
        - shippingAddress
        - subtotal
        - shippingCost
        - discountAmount
        - total
        - couponCode
        - paymentProofStatus
        - createdAt
        - items
    OrderListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
        referenceCode:
          type: string
        paymentStatus:
          type: string
          enum: [pendiente_pago, en_verificacion, pagado, rechazado]
        fulfillmentStatus:
          type: [string, "null"]
          enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado, null]
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        total:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - referenceCode
        - paymentStatus
        - fulfillmentStatus
        - deliveryMethod
        - total
        - createdAt
    OrderList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderListItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    PaymentProofUploadUrl:
      type: object
      properties:
        uploadUrl:
          type: string
          description: PUT the file to this URL (direct to private Storage)
        path:
          type: string
          description: Storage object path to send back when attaching the proof
        token:
          type: string
      required:
        - uploadUrl
        - path
        - token
    AttachPaymentProofInput:
      type: object
      properties:
        path:
          type: string
          description: Storage object path returned by the upload-url endpoint
        amountReported:
          type: [string, "null"]
      required:
        - path
    PaymentVerificationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
        referenceCode:
          type: string
        customerEmail:
          type: string
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        # Order total (server-computed). Fixed-point money string.
        total:
          type: string
        # Amount the customer typed when uploading the proof, if any. May differ from total.
        amountReported:
          type: [string, "null"]
        # Signed, expiring URL to the constancia image in the private bucket (null if none).
        proofUrl:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - referenceCode
        - customerEmail
        - deliveryMethod
        - total
        - amountReported
        - proofUrl
        - createdAt
    PaymentVerificationQueue:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PaymentVerificationItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    ShipmentItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
        referenceCode:
          type: string
        customerEmail:
          type: string
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        fulfillmentStatus:
          type: string
          enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado]
        shippingAddress:
          type: [string, "null"]
        total:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - referenceCode
        - customerEmail
        - deliveryMethod
        - fulfillmentStatus
        - shippingAddress
        - total
        - createdAt
    ShipmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ShipmentItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    AdvanceFulfillmentInput:
      type: object
      properties:
        to:
          type: string
          enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado]
      required:
        - to
    AdminProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        size:
          type: string
        color:
          type: string
        sku:
          type: string
        stock:
          type: integer
        priceOverride:
          type: [string, "null"]
        active:
          type: boolean
      required:
        - id
        - size
        - color
        - sku
        - stock
        - priceOverride
        - active
    AdminProductMedia:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [image, video]
        path:
          type: string
          description: Storage object path in the public bucket
        sortOrder:
          type: integer
      required:
        - id
        - kind
        - path
        - sortOrder
    AttachProductMediaInput:
      type: object
      properties:
        path:
          type: string
          minLength: 1
          description: Storage path returned by the media upload-url endpoint
        kind:
          type: string
          enum: [image, video]
          default: image
      required:
        - path
    AdminProduct:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        fit:
          type: [string, "null"]
        price:
          type: string
        badge:
          type: [string, "null"]
        featured:
          type: boolean
        active:
          type: boolean
        categoryId:
          type: string
          format: uuid
        categoryName:
          type: string
        occasions:
          type: array
          items:
            $ref: "#/components/schemas/Occasion"
        stockTotal:
          type: integer
        variants:
          type: array
          items:
            $ref: "#/components/schemas/AdminProductVariant"
        media:
          type: array
          items:
            $ref: "#/components/schemas/AdminProductMedia"
      required:
        - id
        - slug
        - name
        - description
        - fit
        - price
        - badge
        - featured
        - active
        - categoryId
        - categoryName
        - occasions
        - stockTotal
        - variants
        - media
    AdminProductList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminProduct"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    CreateVariantInput:
      type: object
      properties:
        size:
          type: string
          minLength: 1
        color:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        stock:
          type: integer
          minimum: 0
          default: 0
        priceOverride:
          type: [string, "null"]
      required:
        - size
        - color
        - sku
    CreateProductInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type: [string, "null"]
        fit:
          type: [string, "null"]
        badge:
          type: [string, "null"]
        featured:
          type: boolean
          default: false
        occasionIds:
          type: array
          items:
            type: string
            format: uuid
        variants:
          type: array
          items:
            $ref: "#/components/schemas/CreateVariantInput"
      required:
        - name
        - price
        - categoryId
    UpdateProductInput:
      type: object
      properties:
