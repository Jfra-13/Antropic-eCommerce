openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: Catalog read operations (categories, occasions, products)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /categories:
    get:
      operationId: listCategories
      tags: [catalog]
      summary: List active categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /occasions:
    get:
      operationId: listOccasions
      tags: [catalog]
      summary: List active occasions
      responses:
        "200":
          description: Occasions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Occasion"
  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      summary: List active products (paginated)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: occasion
          in: query
          required: false
          description: Filter by occasion slug
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: Case-insensitive name search
          schema:
            type: string
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
  /products/{slug}:
    get:
      operationId: getProduct
      tags: [catalog]
      summary: Get one active product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - slug
        - name
        - sortOrder
    Occasion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - slug
        - name
        - sortOrder
    ProductImage:
      type: object
      properties:
        kind:
          type: string
          enum: [image, video]
        path:
          type: string
        sortOrder:
          type: integer
      required:
        - kind
        - path
        - sortOrder
    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        size:
          type: string
        color:
          type: string
        sku:
          type: string
        stock:
          type: integer
      required:
        - id
        - size
        - color
        - sku
        - stock
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        fit:
          type: [string, "null"]
        # Money is fixed-point numeric serialized as a string. Never parse to float for math.
        price:
          type: string
        badge:
          type: [string, "null"]
        featured:
          type: boolean
        category:
          $ref: "#/components/schemas/Category"
        occasions:
          type: array
          items:
            $ref: "#/components/schemas/Occasion"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
      required:
        - id
        - slug
        - name
        - description
        - fit
        - price
        - badge
        - featured
        - category
        - occasions
        - images
        - variants
    ProductList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
