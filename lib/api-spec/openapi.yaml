openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: Catalog read operations (categories, occasions, products)
  - name: cart
    description: Persisted cart operations (owner-scoped)
  - name: wishlist
    description: Persisted wishlist operations (owner-scoped)
  - name: checkout
    description: Checkout quote (server-side totals preview, owner-scoped)
  - name: orders
    description: Order operations (create from cart, list/get own orders)
  - name: payments
    description: Payment proof upload (Yape/Plin constancia, owner-scoped)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /categories:
    get:
      operationId: listCategories
      tags: [catalog]
      summary: List active categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /occasions:
    get:
      operationId: listOccasions
      tags: [catalog]
      summary: List active occasions
      responses:
        "200":
          description: Occasions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Occasion"
  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      summary: List active products (paginated)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: occasion
          in: query
          required: false
          description: Filter by occasion slug
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: Case-insensitive name search
          schema:
            type: string
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
  /products/{slug}:
    get:
      operationId: getProduct
      tags: [catalog]
      summary: Get one active product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get the authenticated user's cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add a variant to the cart (increments if already present)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "404":
          description: Variant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cart/items/{variantId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Set the absolute quantity of a cart line
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartQuantityInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "404":
          description: Line not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove a variant from the cart
      parameters:
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /cart/merge:
    post:
      operationId: mergeCart
      tags: [cart]
      summary: Merge a guest cart into the persisted cart (sums quantities, clamps to stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartMergeInput"
      responses:
        "200":
          description: Merged cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get the authenticated user's wishlist products
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
    post:
      operationId: addWishlistItem
      tags: [wishlist]
      summary: Add a product to the wishlist (idempotent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistInput"
      responses:
        "200":
          description: Updated wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /wishlist/{productId}:
    delete:
      operationId: removeWishlistItem
      tags: [wishlist]
      summary: Remove a product from the wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
  /checkout/quote:
    post:
      operationId: checkoutQuote
      tags: [checkout]
      summary: Preview server-side totals for the current cart (subtotal + shipping - coupon)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutQuoteInput"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutQuote"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Coupon invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order from the authenticated user's cart (totals computed server-side)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid body (missing address/pickup point)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Empty cart or out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Coupon invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listOrders
      tags: [orders]
      summary: List the authenticated user's orders (paginated, newest first)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get one of the authenticated user's orders (used for payment status polling)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/{id}/payment-proof/upload-url:
    post:
      operationId: createPaymentProofUploadUrl
      tags: [payments]
      summary: Get a signed URL to upload a payment proof directly to private Storage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Signed upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentProofUploadUrl"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/{id}/payment-proof:
    post:
      operationId: attachPaymentProof
      tags: [payments]
      summary: Attach an uploaded payment proof and move the order to verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachPaymentProofInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Order not in a state that accepts a proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - slug
        - name
        - sortOrder
    Occasion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - slug
        - name
        - sortOrder
    ProductImage:
      type: object
      properties:
        kind:
          type: string
          enum: [image, video]
        path:
          type: string
        sortOrder:
          type: integer
      required:
        - kind
        - path
        - sortOrder
    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        size:
          type: string
        color:
          type: string
        sku:
          type: string
        stock:
          type: integer
      required:
        - id
        - size
        - color
        - sku
        - stock
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        fit:
          type: [string, "null"]
        # Money is fixed-point numeric serialized as a string. Never parse to float for math.
        price:
          type: string
        badge:
          type: [string, "null"]
        featured:
          type: boolean
        category:
          $ref: "#/components/schemas/Category"
        occasions:
          type: array
          items:
            $ref: "#/components/schemas/Occasion"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
      required:
        - id
        - slug
        - name
        - description
        - fit
        - price
        - badge
        - featured
        - category
        - occasions
        - images
        - variants
    ProductList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    CartItemInput:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          default: 1
      required:
        - variantId
    CartQuantityInput:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
      required:
        - quantity
    CartMergeInput:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemInput"
      required:
        - items
    CartItem:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        size:
          type: string
        color:
          type: string
        sku:
          type: string
        stock:
          type: integer
        # Effective unit price (variant override or product price). Fixed-point string.
        unitPrice:
          type: string
        quantity:
          type: integer
        image:
          type: [string, "null"]
      required:
        - variantId
        - productId
        - slug
        - name
        - size
        - color
        - sku
        - stock
        - unitPrice
        - quantity
        - image
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
      required:
        - items
    WishlistInput:
      type: object
      properties:
        productId:
          type: string
          format: uuid
      required:
        - productId
    Wishlist:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - items
    CheckoutQuoteInput:
      type: object
      properties:
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        couponCode:
          type: [string, "null"]
      required:
        - deliveryMethod
    QuoteItem:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        name:
          type: string
        variantLabel:
          type: string
        # Fixed-point money strings. Never parse to float for math.
        unitPrice:
          type: string
        quantity:
          type: integer
        lineTotal:
          type: string
      required:
        - variantId
        - name
        - variantLabel
        - unitPrice
        - quantity
        - lineTotal
    CheckoutQuote:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteItem"
        subtotal:
          type: string
        shippingCost:
          type: string
        discountAmount:
          type: string
        total:
          type: string
        couponCode:
          type: [string, "null"]
      required:
        - items
        - subtotal
        - shippingCost
        - discountAmount
        - total
        - couponCode
    CreateOrderInput:
      type: object
      properties:
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        shippingAddress:
          type: [string, "null"]
          description: Required when deliveryMethod is delivery
        pickupPointId:
          type: [string, "null"]
          format: uuid
          description: Required when deliveryMethod is recojo
        couponCode:
          type: [string, "null"]
        idempotencyKey:
          type: [string, "null"]
          description: Client-supplied key; a repeated key returns the same order
      required:
        - deliveryMethod
    OrderItem:
      type: object
      properties:
        variantId:
          type: [string, "null"]
          format: uuid
        productName:
          type: string
        variantLabel:
          type: [string, "null"]
        sku:
          type: [string, "null"]
        unitPrice:
          type: string
        quantity:
          type: integer
        lineTotal:
          type: string
      required:
        - variantId
        - productName
        - variantLabel
        - sku
        - unitPrice
        - quantity
        - lineTotal
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
        # Derived Yape match key: ANT-{orderNumber}. Not stored.
        referenceCode:
          type: string
        paymentStatus:
          type: string
          enum: [pendiente_pago, en_verificacion, pagado, rechazado]
        fulfillmentStatus:
          type: [string, "null"]
          enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado, null]
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        pickupPointId:
          type: [string, "null"]
          format: uuid
        shippingAddress:
          type: [string, "null"]
        subtotal:
          type: string
        shippingCost:
          type: string
        discountAmount:
          type: string
        total:
          type: string
        couponCode:
          type: [string, "null"]
        paymentProofStatus:
          type: [string, "null"]
          enum: [pendiente, aprobado, rechazado, null]
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - orderNumber
        - referenceCode
        - paymentStatus
        - fulfillmentStatus
        - deliveryMethod
        - pickupPointId
        - shippingAddress
        - subtotal
        - shippingCost
        - discountAmount
        - total
        - couponCode
        - paymentProofStatus
        - createdAt
        - items
    OrderListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: integer
        referenceCode:
          type: string
        paymentStatus:
          type: string
          enum: [pendiente_pago, en_verificacion, pagado, rechazado]
        fulfillmentStatus:
          type: [string, "null"]
          enum: [en_preparacion, enviado, entregado, recojo_pendiente, recogido, cancelado, null]
        deliveryMethod:
          type: string
          enum: [delivery, recojo]
        total:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - referenceCode
        - paymentStatus
        - fulfillmentStatus
        - deliveryMethod
        - total
        - createdAt
    OrderList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderListItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit
    PaymentProofUploadUrl:
      type: object
      properties:
        uploadUrl:
          type: string
          description: PUT the file to this URL (direct to private Storage)
        path:
          type: string
          description: Storage object path to send back when attaching the proof
        token:
          type: string
      required:
        - uploadUrl
        - path
        - token
    AttachPaymentProofInput:
      type: object
      properties:
        path:
          type: string
          description: Storage object path returned by the upload-url endpoint
        amountReported:
          type: [string, "null"]
      required:
        - path
